host: localhost:8080
info:
  contact: {}
  description: Backend service (hexagon/clean architecture).
  title: Widyaprada Backend API
  version: "1.0"
paths:
  /api/v1/assignments:
    get:
      consumes:
      - application/json
      description: Ujian yang user ikuti, filter status, sort batas_waktu
      parameters:
      - description: belum_dikerjakan | sudah_dikerjakan
        in: query
        name: status
        type: string
      - default: jadwal_selesai
        description: jadwal_selesai
        in: query
        name: sort_by
        type: string
      - default: asc
        description: asc | desc
        in: query
        name: sort_order
        type: string
      - default: 1
        description: Page
        in: query
        name: page
        type: integer
      - default: 10
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.GetAssignmentListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helper.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/helper.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Tugas Saya
      tags:
      - assignments
  /api/v1/assignments/{examId}/leaderboard:
    get:
      consumes:
      - application/json
      description: Hanya jika tampilkan_leaderboard=Ya & user peserta. 403 jika privat.
      parameters:
      - description: Exam ID
        in: path
        name: examId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.GetLeaderboardResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helper.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/helper.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/helper.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Leaderboard ujian
      tags:
      - assignments
  /api/v1/assignments/{examId}/result:
    get:
      consumes:
      - application/json
      description: Hasil ujian untuk exam tersebut (hanya peserta)
      parameters:
      - description: Exam ID
        in: path
        name: examId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.AssignmentResultResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helper.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/helper.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/helper.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Hasil ujian user
      tags:
      - assignments
  /api/v1/auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Minta link reset password ke email
      parameters:
      - description: Email
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/entity.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.ForgotPasswordResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helper.ErrorResponse'
      summary: Forgot Password
      tags:
      - auth
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Login dengan identifier (email/username) dan password
      parameters:
      - description: Login request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/entity.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helper.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helper.ErrorResponse'
      summary: Login
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: 'Keluar dari aplikasi, invalidasi token. Requires Authorization:
        Bearer &lt;token&gt;'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.LogoutResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helper.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Registrasi mandiri calon peserta (nama, email, nip opsional). Password
        dikirim ke email.
      parameters:
      - description: Register request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/entity.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/entity.RegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helper.ErrorResponse'
      summary: Register
      tags:
      - auth
  /api/v1/auth/reset-password:
    post:
      consumes:
      - application/json
      description: Atur ulang kata sandi dengan token dari email
      parameters:
      - description: Token, password, confirm
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/entity.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.ResetPasswordResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helper.ErrorResponse'
      summary: Reset Password
      tags:
      - auth
  /api/v1/cbt/attempts/{attemptId}/answers:
    post:
      consumes:
      - application/json
      description: Simpan jawaban (option_id untuk PG/B-S, answer_text untuk Essay)
